<div class="flex items-center justify-between mb-6">
  <div>
    <h2 class="text-2xl font-semibold text-white">Users</h2>
    <p class="text-white/50 text-sm mt-1">
      List of users in the application
    </p>
  </div>
  <span class="bg-white/10 backdrop-blur-xl border border-white/20 text-white text-sm px-4 py-2 rounded-xl">{{ users.length }} total</span>
</div>

<div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl overflow-hidden shadow-2xl">
  <p-table [value]="users" styleClass="p-datatable-sm">
    <ng-template #header>
      <tr>
        <th class="px-4 py-3">#</th>
        <th class="px-4 py-3">Name</th>
        <th class="px-4 py-3">Phone</th>
      </tr>
    </ng-template>
    <ng-template #body let-user let-i="rowIndex">
      <tr>
        <td class="px-4 py-3">{{ i + 1 }}</td>
        <td class="px-4 py-3">{{ user.name ?? user.peopleName ?? user }}</td>
        <td class="px-4 py-3">{{ user.phone ?? '-' }}</td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="3" class="px-4 py-6 text-center text-white/40">Tidak ada data</td>
      </tr>
    </ng-template>
  </p-table>
</div>
