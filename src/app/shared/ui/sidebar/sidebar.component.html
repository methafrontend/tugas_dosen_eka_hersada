<aside class="relative w-64 h-screen shrink-0 bg-white/10 backdrop-blur-xl border-r border-white/10 flex flex-col">
  <div class="px-6 py-5 border-b border-white/10">
    <span class="text-lg font-bold bg-linear-to-r from-sky via-lavender to-blush bg-clip-text text-transparent">Admin Panel</span>
    <p class="text-base font-normal bg-linear-to-r from-sky via-lavender to-blush bg-clip-text text-transparent">by Metha Willia</p>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of menu; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-white/15! text-white!"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/60 hover:bg-white/10 hover:text-white transition-colors"
      >
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="px-3 py-4 border-t border-white/10">
    <app-button [variant]="'aurora'" [class]="'w-full font-semibold!'" (onClick)="logout()">Logout</app-button>
  </div>
</aside>
